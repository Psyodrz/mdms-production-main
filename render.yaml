services:
  - type: web
    name: mp-backend-api
    env: node
    buildCommand: "npm install -g pnpm && pnpm install --production=false && npx prisma generate --schema=prisma/schema.prisma && pnpm --filter @mdms/types build && pnpm --filter @mdms/api build"
    startCommand: "pnpm --filter @mdms/api start:prod"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
