version: '3.8'

services:
  # ==========================================
  # Database (PostgreSQL)
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: mdms-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-mdms_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - mdms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Redis Cache
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: mdms-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    networks:
      - mdms-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # NestJS API Backend
  # ==========================================
  api:
    image: mpproduction/api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mdms-api-prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-mdms_prod}?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - WHATSAPP_API_TOKEN=${WHATSAPP_API_TOKEN}
    ports:
      - "3001:3001"
    networks:
      - mdms-network

volumes:
  pgdata:
  redisdata:

networks:
  mdms-network:
    driver: bridge
